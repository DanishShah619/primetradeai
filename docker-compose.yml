version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: primetrade_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: primetrade
      POSTGRES_PASSWORD: primetrade_secret
      POSTGRES_DB: apidb
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U primetrade -d apidb']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: primetrade_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
